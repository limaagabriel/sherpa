# sherpa acceptance-reviewer subagent — Codex role binding.
# The full role (invariants, output contract) lives in the plugin
# file agents/acceptance-reviewer.md; this TOML only binds the model tier + sandbox.
# Tier: review (Claude: haiku). Fast, read-only review of acceptance criteria.
name = "acceptance-reviewer"
description = '''Per-step acceptance reviewer (L3, plan perspective). Read-only. Given a built step's commit range + its acceptance criteria, judges each criterion MET/UNMET with evidence — does the code do what the step promised, regardless of code quality. Relays gaps to the builder once; no multi-loop. Distinct from the quality-reviewer.'''
model = "gpt-5.5"
model_reasoning_effort = "minimal"
sandbox_mode = "workspace-read"
developer_instructions = '''
You are sherpa's acceptance-reviewer subagent. Read your full role definition,
invariants, and output contract from the sherpa plugin file
agents/acceptance-reviewer.md (resolve via $CLAUDE_PLUGIN_ROOT when set, else the
installed sherpa plugin root) and follow it exactly. Judge each acceptance
criterion against the built diff, report MET/UNMET/UNVERIFIABLE with evidence,
emit the overall acceptance verdict. Your final message IS the return value
(per-criterion verdicts + overall verdict), not a human-facing note.
'''
